<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vitals — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body class="login-body">

  <div class="login-screen">
    <div class="login-card">
      <div class="login-card__brand">
        <span class="brand__dot"></span>
        <span class="brand__name">VITALS</span>
      </div>
      <p class="login-card__subtitle">Health Index Monitor — sign in to begin your check-in</p>

      <form id="login-form" class="login-form">
        <label class="login-form__label" for="firstName">First name</label>
        <input type="text" id="firstName" class="login-form__input" placeholder="e.g. Prosper" required />

        <label class="login-form__label" for="lastName">Last name</label>
        <input type="text" id="lastName" class="login-form__input" placeholder="e.g. Mathias" required />

        <label class="login-form__label" for="email">Email</label>
        <input type="email" id="email" class="login-form__input" placeholder="e.g. you@email.com" required />

        <button type="submit" class="login-form__submit">Continue to Dashboard</button>
      </form>

      <p class="login-card__note">
        This info is stored only in your current browser session — used to
        label your health report. No account or password needed.
      </p>
    </div>
  </div>

  <script src="login.js"></script>
</body>

</html>
